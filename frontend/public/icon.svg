<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0f1219"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Cube isométrique centré -->
  <!-- Face du haut -->
  <polygon points="256,110 390,188 256,266 122,188" fill="url(#top)"/>
  <!-- Face gauche -->
  <polygon points="122,188 256,266 256,370 122,292" fill="url(#left)"/>
  <!-- Face droite -->
  <polygon points="390,188 256,266 256,370 390,292" fill="url(#right)"/>
  <!-- Filament animé — courbe qui sort du cube -->
  <path d="M 256 110 Q 320 80 340 50" stroke="#f59e0b" stroke-width="12" fill="none"
        stroke-linecap="round" opacity="0.9"/>
  <circle cx="340" cy="50" r="10" fill="#f59e0b" opacity="0.9"/>
  <!-- Lettre B subtile au centre de la face gauche -->
  <text x="178" y="300" font-family="system-ui,sans-serif" font-size="52" font-weight="800"
        fill="white" opacity="0.18" text-anchor="middle">B</text>
</svg>