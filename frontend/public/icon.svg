<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="140%" y2="140%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi bleu/violet -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Reflet subtil -->
  <rect width="512" height="256" rx="115" fill="url(#shine)"/>

  <!-- Lettre B blanche, bold, centrée légèrement haute -->
  <text x="220" y="330"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        font-size="320" font-weight="900"
        fill="white" text-anchor="middle"
        letter-spacing="-10">B</text>

  <!-- Nozzle sous le B — signature 3D printing -->
  <rect x="196" y="370" width="48" height="52" rx="6" fill="rgba(255,255,255,0.9)"/>
  <path d="M 196 422 L 220 474 L 244 422 Z" fill="rgba(255,255,255,0.9)"/>
  <!-- Point fondu -->
  <circle cx="220" cy="480" r="10" fill="rgba(255,255,255,0.7)"/>

  <!-- Ligne d impression -->
  <rect x="96" y="490" width="320" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
</svg>