<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BambuNymous</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BambuNymous" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-180.png" />

  <!-- Splash screen -->
  <style>
    html, body { margin:0; padding:0; background:#0f0c29; }
    #splash {
      position:fixed; inset:0; background:linear-gradient(135deg,#1e1b4b,#0f0c29);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      z-index:9999; transition:opacity 0.5s ease;
    }
    #splash img { width:100px; height:100px; border-radius:22px; }
    #splash-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 30px; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #splash-sub {
      font-family: system-ui, sans-serif;
      font-size: 12px; color: #4338ca; letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #splash.hidden { opacity:0; pointer-events:none; }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="splash">
    <img src="/icon-192.png" alt="BambuNymous"/>
    <div id="splash-title">BambuNymous</div>
    <div id="splash-sub">3D Print Manager</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.__hideSplash = function() {
      var s = document.getElementById("splash");
      if (s) { s.classList.add("hidden"); setTimeout(function(){ s.remove(); }, 600); }
    };
  </script>
</body>
</html>
