<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BambuNymous</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BambuNymous" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <!-- Splash screen inline — affiché avant que React monte -->
  <style>
    html, body { margin:0; padding:0; background:#0f1219; }
    #splash {
      position:fixed; inset:0; background:#0f1219;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      z-index:9999; transition:opacity 0.4s ease;
    }
    #splash svg { width:96px; height:96px; }
    #splash-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 28px; font-weight: 800; letter-spacing: -0.02em;
      color: white;
    }
    #splash-sub {
      font-family: system-ui, sans-serif;
      font-size: 13px; color: #64748b; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #splash.hidden { opacity:0; pointer-events:none; }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a1f2e"/>
          <stop offset="100%" style="stop-color:#0f1219"/>
        </linearGradient>
        <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#60a5fa"/>
          <stop offset="100%" style="stop-color:#3b82f6"/>
        </linearGradient>
        <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#2563eb"/>
          <stop offset="100%" style="stop-color:#1d4ed8"/>
        </linearGradient>
        <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#93c5fd"/>
          <stop offset="100%" style="stop-color:#60a5fa"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="112" fill="url(#bg)"/>
      <polygon points="256,110 390,188 256,266 122,188" fill="url(#top)"/>
      <polygon points="122,188 256,266 256,370 122,292" fill="url(#left)"/>
      <polygon points="390,188 256,266 256,370 390,292" fill="url(#right)"/>
      <path d="M 256 110 Q 320 80 340 50" stroke="#f59e0b" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
      <circle cx="340" cy="50" r="10" fill="#f59e0b" opacity="0.9"/>
    </svg>
    <div id="splash-title">BambuNymous</div>
    <div id="splash-sub">3D Print Manager</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Masquer le splash quand React est prêt
    window.__hideSplash = function() {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 500); }
    };
  </script>
</body>
</html>
