services:
  bambunymous:
    image: ghcr.io/an0nym0us63/bambunymous:latest
    container_name: bambunymous
    restart: unless-stopped
    ports:
      - "7914:8000"
    volumes:
      - bambunymous_data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite+aiosqlite:////data/bambunymous.db
      - UPLOADS_DIR=/data/uploads
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  bambunymous_data:
